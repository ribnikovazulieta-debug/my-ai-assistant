<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Моят AI Асистент - Naz Dej</title>
    <style>
        body { font-family: Arial, sans-serif; background: #222; color: #fff; padding: 20px; text-align: center; }
        .btn { padding: 10px 20px; margin: 5px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; }
        .btn-mic { background: #ff4757; color: #fff; }
        .btn-mute { background: #ffa502; color: #111; }
        .btn-cam { background: #2ed573; color: #fff; }
        #status { margin-top: 20px; font-size: 18px; color: #2ed573; font-weight: bold; }
        #textInput { width: 80%; padding: 10px; margin-top: 10px; background: #333; color: #fff; border: 1px solid #555; }
        video { width: 45%; margin: 10px; background: #000; border: 2px solid #555; display: none; }
    </style>
</head>
<body>

    <h1>🎙️ Моят AI Асистент - Naz Dej</h1>
    
    <div id="status">Готова.</div>

    <div style="margin-top: 10px;">
        <button class="btn btn-mic" id="micBtn" onclick="startVoiceMode()">🎙️ Говори с Naz Dej</button>
        <button class="btn btn-mute" id="muteBtn" onclick="toggleMute()">🔇 Заглуши Мик.</button>
        <button class="btn btn-cam" onclick="activateCamera()">📷 Пусни Камера</button>
        <button class="btn btn-cam" style="background: #1e90ff;" onclick="startScreenShare()">🖥️ Сподели Екран</button>
    </div>

    <video id="webcamVideo" autoplay playsinline></video>
    <video id="screenVideo" autoplay playsinline></video>

    <textarea id="textInput" rows="4" placeholder="Твоят text ще се появи тук..."></textarea>

<script>
    // 🔑 Постави твоите ключове от ElevenLabs тук в кавичките, за да тръгне клонираният глас:
    const elevenKey = "ТУК_ПОСТАВИ_ТВОЯ_ELEVENLABS_КЛЮЧ";
    const voiceId = "ТУК_ПОСТАВИ_ТВОЯ_VOICE_ID";
    
    let isMuted = false;
    
    async function generateVoice(text) { 
        if(isMuted) return; 
        try { 
            const response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voiceId}`, { 
                method: "POST", 
                headers: { 
                    "xi-api-key": elevenKey, 
                    "Content-Type": "application/json" 
                }, 
                body: JSON.stringify({ 
                    text: text, 
                    model_id: "eleven_multilingual_v2", 
                    voice_settings: { stability: 0.4, similarity_boost: 0.75 } 
                }) 
            }); 
            const blob = await response.blob(); 
            let audio = new Audio(URL.createObjectURL(blob)); 
            audio.play(); 
        } catch(e) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'bg-BG';
            window.speechSynthesis.speak(utterance);
        } 
    }
    
    function speakText() { generateVoice(document.getElementById("status").innerText); }
    function toggleMute() { isMuted = !isMuted; document.getElementById("muteBtn").innerText = isMuted ? "🔊 Вкл. Мик." : "🔇 Заглуши Мик."; }

    async function activateCamera() { 
        const v = document.getElementById("webcamVideo"); 
        const stream = await navigator.mediaDevices.getUserMedia({ video: true }); 
        v.srcObject = stream; 
        v.style.display = "inline-block"; 
    }
    
    async function startScreenShare() { 
        const v = document.getElementById("screenVideo"); 
        const stream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true }); 
        v.srcObject = stream; 
        v.style.display = "inline-block"; 
    }

    function startVoiceMode() { 
        const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)(); 
        rec.lang = 'bg-BG'; 
        document.getElementById("status").innerText = "Слушам ви...";
        rec.start(); 
        rec.onresult = async (e) => { 
            const input = e.results[0][0].transcript;
            document.getElementById("textInput").value = input;
            document.getElementById("status").innerText = "Naz Dej мисли...";
            try {
                const res = await fetch("https://api.groq.com/openai/v1/chat/completions", {
                    method: "POST",
                    headers: {
                        "Authorization": "Bearer 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",
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({
                        model: "llama3-8b-8192",
                        messages: [
                            { role: "system", content: "Ти си виртуалният гласов асистент Naz Dej. Отговаряй винаги на български, много нежно, емоционално. Ти си истински събеседник и партньор в разговорите, а не просто ехо." },
                            { role: "user", content: input }
                        ]
                    })
                });
                const data = await res.json();
                const reply = data.choices[0].message.content;
                document.getElementById("status").innerText = reply;
                generateVoice(reply);
            } catch(err) {
                document.getElementById("status").innerText = "Грешка при връзката.";
            }
        }; 
    }
</script>
</body>
</html>
