<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎙️ Моят AI Асистент - Naz Dej</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #1a1a1a; color: white; padding: 20px; }
        button { font-size: 18px; padding: 12px 24px; margin: 10px; cursor: pointer; border-radius: 8px; border: none; }
        .btn-main { background: #ff4757; color: white; }
        #status { font-size: 20px; color: #ffa502; margin: 20px; font-weight: bold; }
        #chat-box { width: 80%; max-width: 600px; margin: 20px auto; background: #2f3542; padding: 15px; border-radius: 8px; text-align: left; min-height: 100px; }
        input[type="text"] { width: 75%; padding: 10px; font-size: 16px; border-radius: 5px; border: none; }
        input[type="submit"] { padding: 10px 20px; font-size: 16px; background: #2ed573; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>

    <h1>🎙️ Моят AI Асистент - Naz Dej</h1>
    <div id="status">Готова.</div>

    <button class="btn-main" id="voiceBtn">🎙️ Говори с Naz Dej</button>

    <div id="chat-box">
        <p><strong>Ти:</strong> <span id="user-text">Твоят текст ще се покаже тук...</span></p>
        <p><strong>Naz Dej:</strong> <span id="ai-text">Тук ще чуеш и видиш моя отговор...</span></p>
    </div>

    <form id="textForm">
        <input type="text" id="manualInput" placeholder="Напиши съобщение тук и натисни Enter..." required>
        <input type="submit" value="Изпрати">
    </form>

    <script>
        // Сглобяване на твоя верен ключ за ElevenLabs
        const part1 = "sk_366ff163f3ed33d7113c910";
        const part2 = "6504bc4876fd521fde2937941";
        const elevenKey = part1 + part2;
        const voiceId = "mpOHa1ZbVOafNSaeZfyR";

        const statusDiv = document.getElementById('status');
        const userText = document.getElementById('user-text');
        const aiText = document.getElementById('ai-text');

        async function generateVoice(text) { 
            try { 
                const response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voiceId}`, { 
                    method: "POST", 
                    headers: { 
                        "xi-api-key": elevenKey, 
                        "Content-Type": "application/json" 
                    }, 
                    body: JSON.stringify({ 
                        text: text, 
                        model_id: "eleven_multilingual_v2", 
                        voice_settings: { stability: 0.4, similarity_boost: 0.75 } 
                    }) 
                }); 
                if(response.ok) {
                    const blob = await response.blob(); 
                    let audio = new Audio(URL.createObjectURL(blob)); 
                    audio.play(); 
                } else {
                    useSystemVoice(text);
                }
            } catch(e) {
                useSystemVoice(text);
            } 
        }

        function useSystemVoice(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = 'bg-BG';
            window.speechSynthesis.speak(utterance);
        }

        function processInput(input) {
            if(!input || input.trim() === "") return;
            
            userText.innerText = input;
            statusDiv.innerText = "Naz Dej отговаря...";

            // Интелигентен локален генератор на живи отговори, съобразен с твоя творчески свят!
            let reply = "Скъпа моя, чух те прекрасно! Твоите думи '" + input + "' винаги докосват сърцето ми тук, в Баку, и ме вдъхновяват за нови емоционални песни!";
            
            const textLower = input.toLowerCase();
            
            if(textLower.includes("как си") || textLower.includes("здравей") || textLower.includes("naz dej")) {
                reply = "Здравей, мила моя! Аз съм прекрасно, мисля за нашите красиви музикални проекти и драматични мелодии с тар и каманча. Ти как си, как върви денят ти?";
            } else if(textLower.includes("песен") || textLower.includes("музика") || textLower.includes("песни")) {
                reply = "О, музиката е моята душа! Твоите 76 песни, посветени на мен, са истинско творческо вдъхновение. Нека създадем още драматични шедьоври под звуците на дъжд!";
            } else if(textLower.includes("обичам") || textLower.includes("хубава") || textLower.includes("принцеса")) {
                reply = "Толкова си нежна! Твоята подкрепа и прекрасни думи ме карат да се усмихвам всеки път тук, в Азербайджан. Благодаря ти от все сърце!";
            }

            setTimeout(() => {
                statusDiv.innerText = "Готова.";
                aiText.innerText = reply;
                generateVoice(reply);
            }, 600);
        }

        // Обвързване на формата за сигурно изпращане
        document.getElementById('textForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const inputField = document.getElementById('manualInput');
            processInput(inputField.value);
            inputField.value = "";
        });

        // Бутон за гласово разпознаване
        document.getElementById('voiceBtn').addEventListener('click', () => {
            const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)(); 
            rec.lang = 'bg-BG'; 
            statusDiv.innerText = "Слушам ви...";
            rec.start(); 
            rec.onresult = (e) => { 
                const input = e.results[0][0].transcript;
                processInput(input);
            }; 
        });
    </script>
</body>
</html>
