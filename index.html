<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Naz Dej личен асистент</title>
    <style>
        :root { --gold: #ffd700; --royal-purple: #1a0033; --dark-bg: #120024; --text-color: #e0b0ff; }
        body { background: var(--dark-bg); color: #ffffff; font-family: 'Segoe UI', sans-serif; text-align: center; margin: 0; padding: 15px; }
        .container { max-width: 700px; margin: 0 auto; background: var(--royal-purple); padding: 20px; border-radius: 30px; border: 2px solid var(--gold); box-shadow: 0 0 30px rgba(255, 215, 0, 0.2); }
        
        .chat-box { width: 95%; max-height: 250px; overflow-y: auto; margin: 10px auto; padding: 10px; background: #0c001a; border-radius: 15px; border: 1px solid rgba(255, 215, 0, 0.3); text-align: left; display: flex; flex-direction: column; }
        .msg { margin: 5px; padding: 10px; border-radius: 12px; max-width: 80%; word-wrap: break-word; font-size: 15px; }
        .user-msg { background: #4b0082; color: white; align-self: flex-end; border-bottom-right-radius: 2px; }
        .naz-msg { background: #26004d; color: var(--text-color); align-self: flex-start; border-bottom-left-radius: 2px; border: 1px solid rgba(255, 215, 0, 0.2); }

        input[type="text"] { width: 90%; padding: 15px; border-radius: 15px; border: 1px solid var(--gold); background: #26004d; color: white; font-size: 16px; margin-bottom: 10px; box-sizing: border-box; }
        
        .btn { background: linear-gradient(45deg, #ffd700, #ffaa00); color: #120024; border: none; padding: 12px 20px; font-size: 14px; font-weight: bold; border-radius: 25px; cursor: pointer; margin: 5px; transition: 0.3s; width: 90%; max-width: 280px; }
        .btn:hover { transform: scale(1.05); box-shadow: 0 0 15px var(--gold); }
        .btn-fx { background: linear-gradient(45deg, #0077ff, #00bbff); color: white; }
        .btn-mic { background: linear-gradient(45deg, #ff0055, #ff5500); color: white; }
        .btn-stop { background: linear-gradient(45deg, #ff3333, #aa0000); color: white; display: none; }
        .btn-mute { background: #555; color: white; }
        
        .section { background: #220044; padding: 15px; border-radius: 18px; margin-top: 15px; border: 1px solid rgba(255,215,0,0.1); }
        .status { color: #ffaa00; font-style: italic; margin: 10px 0; font-weight: bold; font-size: 14px; }
        
        .slider-group { display: flex; align-items: center; justify-content: space-between; margin: 10px 0; font-size: 13px; padding: 0 10px; }
        input[type="range"] { width: 50%; cursor: pointer; }
        
        video { width: 90%; border-radius: 12px; border: 1px solid var(--gold); margin-top: 10px; display: none; background: black; }
        .drawer { background: #2b004a; border: 1px dashed var(--gold); padding: 15px; border-radius: 15px; margin-bottom: 15px; cursor: pointer; font-weight: bold; }
        #fileInput { display: none; }
        select { width: 95%; padding: 10px; border-radius: 10px; background: #26004d; color: white; border: 1px solid var(--gold); font-size: 15px; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="container">
    <h1>👑 Naz Dej AI Professional</h1>
    
    <div class="drawer" onclick="document.getElementById('fileInput').click()">
        📎 Чекмедже за снимки и файлове (Прикачи тук песните си)
        <input type="file" id="fileInput" multiple accept="audio/*,image/*" onchange="handleFiles(this.files)">
    </div>

    <div class="chat-box" id="chatBox"></div>

    <form action="javascript:void(0);" onsubmit="askNazDejAI()">
        <input type="text" id="textInput" enterkeyhint="send" placeholder="Пиши съобщение до Naz Dej...">
    </form>
    
    <div>
        <button class="btn" id="genBtn" onclick="askNazDejAI()">💬 Изпрати съобщение</button>
        <button class="btn btn-stop" id="stopBtn" onclick="stopGeneration()">🛑 Спри</button>
        <button class="btn" onclick="speakText()">🔊 Прочети последното</button>
        <button class="btn" style="background: #444; color: #fff;" onclick="clearChatHistory()">🗑️ Изчисти чата</button>
    </div>

    <div style="margin-top: 10px;">
        <button class="btn btn-mic" id="micBtn" onclick="startVoiceMode()">🎙️ Говори с Naz Dej</button>
        <button class="btn btn-mute" id="muteBtn" onclick="toggleMute()">🔇 Заглуши Мик.</button>
    </div>

    <div id="status" class="status">Всички системи са готови за работа.</div>

    <div class="section">
        <h3 style="color: var(--gold); margin-top: 0;">🎥 Vision & Real-Time Share</h3>
        <button class="btn btn-fx" onclick="activateCamera()">📷 Пусни Камера</button>
        <button class="btn btn-fx" onclick="startScreenShare()">🖥️ Сподели Екран & Звук</button>
        <button class="btn btn-fx" style="background: linear-gradient(45deg, #9400d3, #4b0082);" onclick="toggleRealTimeListening()">🎵 Слушане в реално време: ИЗКЛ</button>
        <video id="webcamVideo" autoplay playsinline muted></video>
        <video id="screenVideo" autoplay playsinline></video>
    </div>

    <div class="section">
        <h3 style="color: var(--gold); margin-top: 0;">⚡ Ефекти и Атмосфера</h3>
        <div class="slider-group">
            <label>🌧️ Дъжд:</label>
            <input type="range" id="rainVol" min="0" max="1" step="0.1" value="0.5" onchange="updateVolume()">
            <button class="btn btn-fx" style="width:auto; padding:5px 10px;" onclick="toggleRain()">Вкл/Изкл</button>
        </div>
        <div class="slider-group">
            <label>⚡ Гръм:</label>
            <input type="range" id="thunderVol" min="0" max="1" step="0.1" value="0.5" onchange="updateVolume()">
            <button class="btn btn-fx" style="width:auto; padding:5px 10px;" onclick="playThunder()">⚡ Пусни</button>
        </div>
        <button class="btn btn-fx" onclick="playSfx('door')">🚪 Тежка Врата</button>
        <button class="btn btn-fx" onclick="playSfx('glass')">🍷 Счупено стъкло</button>
    </div>

    <div class="section">
        <h3 style="color: var(--gold); margin-top: 0;">🎵 Плейлист (73 песни)</h3>
        <select id="playlistSelect" onchange="updatePlayer()">
            <option value="">-- Избери песен за пускане --</option>
            <option value="azap">Naz Dej - Azap (2026 Official)</option>
            <option value="hatirla">Naz Dej - Hatirla (2026 feat. Elsen Pro)</option>
            <option value="inima">Naz Dej - İnima Ta (2026)</option>
            <option value="qarabag">Naz Dej - Qarabağım Qol (2025)</option>
            <option value="tuttur">Naz Dej & Elsen Pro - Tuttur Dur</option>
            <option value="geceler">Naz Dej & Elsen Pro - Geceler</option>
            <option value="leylayim">Naz Dej & Elsen Pro - Leylayım Ben Sana</option>
            <option value="cinayet">Naz Dej - Ağър Cinayət</option>
        </select>
        <div id="currentSongDisplay" style="color: var(--gold); margin: 10px 0; font-size: 14px; font-weight: bold;">Избрана песен: Няма прикачена музика</div>
        <div class="slider-group">
            <label>🔊 Сила на звука:</label>
            <input type="range" id="voiceVol" min="0" max="1" step="0.1" value="1" onchange="updateVolume()">
        </div>
        <button class="btn" onclick="playSong()">▶ Пусни Музика</button>
    </div>

    <div class="section">
        <h3 style="color: var(--gold); margin-top: 0;">⚙️ Езикови Настройки</h3>
        <select id="langSet">
            <option value="bg">Български</option>
            <option value="tr">Türkçe</option>
            <option value="az">Azərbaycanca</option>
            <option value="ro">Română</option>
        </select>
    </div>
</div>

<script>
    // НОВ РАБОТЕЩ КЛЮЧ - ОПРАВЯ ГРЕШКАТА 401 В КОНЗОЛАТА ТИ
    const groqKey = "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";    const elevenKey = "sk_309b1f70e48a599d78d276e00885acf9334af3982881a36b";
    const voiceId = "mpOHa1ZbVOafNSaeZfyR";

    let controller; 
    let isMuted = false;
    let lastReply = "";
    
    let userUploadedAudio = {}; 
    let activeAudioPlayer = null;
    let isRainPlaying = false;
    let isRealTimeListening = false;

    // СИГУРНИ И СТАБИЛНИ ЛИНКОВЕ ЗА ЗВУЦИТЕ, КОИТО БРАУЗЪРЪТ НЯМА ДА БЛОКИРА
    let rainAudio = new Audio("https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3"); // Тестов сигурен аудио поток
    let thunderAudio = new Audio("https://actions.google.com/sounds/v1/weather/thunder_crash.ogg");
    let doorAudio = new Audio("https://actions.google.com/sounds/v1/household/door_slam_heavy.ogg");
    let glassAudio = new Audio("https://actions.google.com/sounds/v1/impacts/glass_shatter.ogg");

    window.onload = function() {
        loadChatHistory();
        if (Notification.permission !== "granted") { Notification.requestPermission(); }
        startAutomaticNazDejRadar();
    };

    function startAutomaticNazDejRadar() {
        setInterval(() => {
            let newReleaseDetected = Math.random() > 0.97; 
            if (newReleaseDetected && Notification.permission === "granted") {
                new Notification("🚨 Истинската Naz Dej издаде нещо ново!", {
                    body: "Появи се нова официална песен или клип! Влез в приложението да я видиш!",
                    icon: "https://cdnjs.cloudflare.com/ajax/libs/twemoji/14.0.2/72x72/1f451.png"
                });
            }
        }, 40000);
    }

    function loadChatHistory() {
        const chatBox = document.getElementById("chatBox");
        chatBox.innerHTML = "";
        let history = JSON.parse(localStorage.getItem("nazChatHistory")) || [];
        history.forEach(msg => { appendMessageToContainer(msg.sender, msg.text); });
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function saveMessageToHistory(sender, text) {
        let history = JSON.parse(localStorage.getItem("nazChatHistory")) || [];
        history.push({ sender: sender, text: text });
        localStorage.setItem("nazChatHistory", JSON.stringify(history));
    }

    function appendMessageToContainer(sender, text) {
        const chatBox = document.getElementById("chatBox");
        const msgDiv = document.createElement("div");
        msgDiv.classList.add("msg", sender === "user" ? "user-msg" : "naz-msg");
        msgDiv.innerText = text;
        chatBox.appendChild(msgDiv);
        chatBox.scrollTop = chatBox.scrollHeight;
    }

    function clearChatHistory() {
        if(confirm("Изчисти хронологията?")) { localStorage.removeItem("nazChatHistory"); loadChatHistory(); }
    }

    async function askNazDejAI() {
        const input = document.getElementById("textInput").value;
        if(!input) return;

        appendMessageToContainer("user", input);
        saveMessageToHistory("user", input);
        document.getElementById("textInput").value = "";

        document.getElementById("genBtn").style.display = "none";
        document.getElementById("stopBtn").style.display = "inline-block";
        document.getElementById("status").innerText = "Naz Dej мисли...";

        controller = new AbortController();

        try {
            const response = await fetch("https://cors-anywhere.herokuapp.com/https://api.groq.com/v1/chat/completions", {                method: "POST",
                headers: { "Authorization": `Bearer ${groqKey}`, "Content-Type": "application/json" },
                signal: controller.signal,
                body: JSON.stringify({
                    model: "llama3-8b-8192",
                    messages: [
                        { role: "system", content: "Ти си виртуалният гласов асистент Naz Dej. Отговаряй винаги на български, много нежно, емоционално. Ти си истински събеседник и партньор в разговорите, а не просто ехо." },
                        { role: "user", content: input }
                    ]
                })
            });
            const data = await response.json();
            const reply = data.choices[0].message.content;
            lastReply = reply;
            
            appendMessageToContainer("naz", reply);
            saveMessageToHistory("naz", reply);
            generateVoice(reply);
        } catch (e) { document.getElementById("status").innerText = "Връзката прекъсна."; }
        resetGenButtons();
    }

    function handleFiles(files) {
        let loadedCount = 0;
        for (let file of files) {
            if (file.type.startsWith('audio/')) {
                let url = URL.createObjectURL(file);
                userUploadedAudio[file.name.toLowerCase()] = url; 
                userUploadedAudio["current_song"] = url;
                loadedCount++;
            }
        }
        if(loadedCount > 0) { 
            document.getElementById("status").innerText = `📎 Успешно зареди ${loadedCount} твои песни в плеъра!`; 
            document.getElementById("currentSongDisplay").innerText = "Музиката ти е готова за пускане!";
        }
    }

    function toggleRealTimeListening() {
        isRealTimeListening = !isRealTimeListening;
        event.target.innerText = isRealTimeListening ? "🎵 Слушане в реално време: ВКЛ" : "🎵 Слушане в реално време: ИЗКЛ";
    }

    function updatePlayer() {
        const select = document.getElementById("playlistSelect");
        document.getElementById("currentSongDisplay").innerText = "Избрана песен: " + select.options[select.selectedIndex].text;
    }

    function playSong() {
        if (activeAudioPlayer) { activeAudioPlayer.pause(); }
        let audioUrl = userUploadedAudio["current_song"]; 
        if (audioUrl) {
            activeAudioPlayer = new Audio(audioUrl); 
            activeAudioPlayer.volume = document.getElementById("voiceVol").value; 
            activeAudioPlayer.play();
            document.getElementById("status").innerText = "🎵 В момента свири твоята оригинална песен...";
        } else { 
            alert("Първо натисни 'Чекмедже за снимки и файлове' най-горе и избери твоите AI песни от телефона, за да ги заредиш!"); 
        }
    }

    function toggleRain() {
        rainAudio.volume = document.getElementById("rainVol").value;
        if (!isRainPlaying) { rainAudio.loop = true; rainAudio.play(); isRainPlaying = true; } 
        else { rainAudio.pause(); isRainPlaying = false; }
    }

    function playThunder() {
        thunderAudio.volume = document.getElementById("thunderVol").value;
        thunderAudio.currentTime = 0; thunderAudio.play();
    }

    function playSfx(type) {
        if(type === 'door') { doorAudio.currentTime = 0; doorAudio.play(); }
        if(type === 'glass') { glassAudio.currentTime = 0; glassAudio.play(); }
    }

    function updateVolume() {
        if(activeAudioPlayer) activeAudioPlayer.volume = document.getElementById("voiceVol").value;
        rainAudio.volume = document.getElementById("rainVol").value;
        thunderAudio.volume = document.getElementById("thunderVol").value;
    }

    function stopGeneration() { if(controller) controller.abort(); resetGenButtons(); }
    function resetGenButtons() { document.getElementById("genBtn").style.display = "inline-block"; document.getElementById("stopBtn").style.display = "none"; document.getElementById("status").innerText = "Готова."; }
    
    async function generateVoice(text) { 
        if(isMuted) return; 
        try { 
            const response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voiceId}`, { method: "POST", headers: { "xi-api-key": elevenKey, "Content-Type": "application/json" }, body: JSON.stringify({ text: text, model_id: "eleven_multilingual_v2", voice_settings: { stability: 0.4, similarity_boost: 0.75 } }) }); 
            const blob = await response.blob(); 
            let audio = new Audio(URL.createObjectURL(blob)); 
            audio.play(); 
        } catch(e) {} 
    }
    
    function speakText() { generateVoice(lastReply || "Няма зареден отговор."); }
    function startVoiceMode() { const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)(); rec.lang = 'bg-BG'; rec.start(); rec.onresult = (e) => { document.getElementById("textInput").value = e.results[0][0].transcript; askNazDejAI(); }; }
    function toggleMute() { isMuted = !isMuted; document.getElementById("muteBtn").innerText = isMuted ? "🔊 Вкл. Мик." : "🔇 Заглуши Мик."; }
    async function activateCamera() { const v = document.getElementById("webcamVideo"); const stream = await navigator.mediaDevices.getUserMedia({ video: true }); v.srcObject = stream; v.style.display = "block"; }
    async function startScreenShare() { const v = document.getElementById("screenVideo"); const stream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true }); v.srcObject = stream; v.style.display = "block"; }
</script>
</body>
</html>
