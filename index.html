<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🎙️ Моят AI Асистент - Naz Dej (Пълна Версия)</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background: #1a1a1a; color: white; padding: 20px; }
        button { font-size: 16px; padding: 10px 20px; margin: 8px; cursor: pointer; border-radius: 8px; border: none; font-weight: bold; }
        .btn-main { background: #ff4757; color: white; }
        .btn-util { background: #2f3542; color: white; }
        .btn-sound { background: #ffa502; color: black; }
        #status { font-size: 20px; color: #ffa502; margin: 15px; font-weight: bold; }
        #chat-box { width: 85%; max-width: 650px; margin: 20px auto; background: #2f3542; padding: 15px; border-radius: 8px; text-align: left; min-height: 120px; border: 1px solid #555; }
        input[type="text"], select { padding: 10px; font-size: 16px; border-radius: 5px; border: none; margin: 5px; }
        input[type="text"] { width: 60%; }
        input[type="submit"] { padding: 10px 20px; font-size: 16px; background: #2ed573; color: white; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; }
        .section { background: #222; padding: 15px; margin: 15px auto; border-radius: 8px; width: 85%; max-width: 650px; border: 1px solid #444; }
        video { width: 45%; margin: 10px; background: #000; border: 2px solid #555; display: none; border-radius: 5px; }
        .drawer { background: #333; padding: 10px; margin: 10px 0; border-radius: 5px; border: 1px dashed #777; }
    </style>
</head>
<body>

    <h1>🎙️ Моят AI Асистент - Naz Dej</h1>
    <div id="status">Готова.</div>

    <div class="section">
        <button class="btn-main" id="voiceBtn">🎙️ Говори с Naz Dej</button>
        <button class="btn-util" id="liveListenBtn" onclick="toggleLiveListen()">🎧 Слушане в Реално Време: ИЗКЛ.</button>
        <button class="btn-util" id="muteBtn" onclick="toggleMute()">🔇 Заглуши Мик.</button>
        <button class="btn-util" id="camBtn" onclick="activateCamera()">📷 Пусни Камера</button>
        <button class="btn-util" id="screenBtn" onclick="startScreenShare()">🖥️ Сподели Екран със Звук</button>
    </div>

    <div class="section">
        <h3>🌧️ Атмосферен Плейър и Ефекти</h3>
        <button class="btn-sound" onclick="toggleAmbientSound('rain')">🌧️ Дъжд (Старт/Стоп)</button>
        <button class="btn-sound" onclick="toggleAmbientSound('thunder')">⚡ Гръмотевици</button>
        <button class="btn-sound" onclick="playEffect('door')">🚪 Тежка Врата</button>
        <button class="btn-sound" onclick="playEffect('glass')">💎 Счупено Стъкло</button>
    </div>

    <div class="section">
        <h3>📎 Чекмедже за прикачване</h3>
        <div class="drawer">
            <label for="fileInput" style="cursor: pointer;">📁 Избери снимка или документ за четене:</label>
            <input type="file" id="fileInput" accept="image/*, .txt, .pdf" onchange="handleFileUpload()">
        </div>
    </div>

    <div class="section">
        <label for="langSelect">🌐 Избор на език за асистента: </label>
        <select id="langSelect" onchange="changeLanguage()">
            <option value="bg-BG">Български (България)</option>
            <option value="az-AZ">Азербайджански (Baku)</option>
            <option value="tr-TR">Турски (Турция)</option>
            <option value="en-US">English (US)</option>
        </select>
    </div>

    <div id="chat-box">
        <p><strong>Ти:</strong> <span id="user-text">Твоят текст ще се покаже тук...</span></p>
        <p><strong>Naz Dej:</strong> <span id="ai-text">Тук ще чуеш и видиш моя отговор...</span></p>
    </div>

    <form id="textForm">
        <input type="text" id="manualInput" placeholder="Напиши съобщение тук..." required>
        <input type="submit" value="Изпрати">
    </form>

    <video id="webcamVideo" autoplay playsinline></video>
    <video id="screenVideo" autoplay playsinline muted></video> 

    <script>
        // Връщаме скрития ключ за нейния истински клониран глас
        const eEnc = "c2tfMzY2ZmYxNjNmM2VkMzNkNzExM2M5MTA2NTA0YmM0ODc2ZmQ1MjFmZGUyOTM3OTQx";
        const elevenKey = atob(eEnc);
        const voiceId = "mpOHa1ZbVOafNSaeZfyR";

        let isMuted = false;
        let isLiveListening = false;
        let currentLang = "bg-BG";
        let recognition;
        
        let audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        let rainNode = null;

        const statusDiv = document.getElementById('status');
        const userText = document.getElementById('user-text');
        const aiText = document.getElementById('ai-text');
        const webcamVideo = document.getElementById('webcamVideo');
        const screenVideo = document.getElementById('screenVideo');

        function changeLanguage() {
            currentLang = document.getElementById("langSelect").value;
            statusDiv.innerText = "Езикът е сменен на: " + currentLang;
        }

        function toggleMute() { 
            isMuted = !isMuted; 
            document.getElementById("muteBtn").innerText = isMuted ? "🔊 Вкл. Мик." : "🔇 Заглуши Мик."; 
        }

        function toggleLiveListen() {
            isLiveListening = !isLiveListening;
            const btn = document.getElementById("liveListenBtn");
            if(isLiveListening) {
                btn.innerText = "🎧 Слушане в Реално Време: ВКЛ.";
                btn.style.background = "#2ed573";
                startContinuousListening();
            } else {
                btn.innerText = "🎧 Слушане в Реално Време: ИЗКЛ.";
                btn.style.background = "#2f3542";
                if(recognition) recognition.stop();
            }
        }

        function startContinuousListening() {
            recognition = new (window.SpeechRecognition || window.webkitSpeechRecognition)();
            recognition.lang = currentLang;
            recognition.continuous = true;
            recognition.interimResults = false;
            
            recognition.onresult = (e) => {
                if(isMuted) return;
                const input = e.results[e.results.length - 1][0].transcript;
                processInput(input);
            };
            
            recognition.onend = () => {
                if(isLiveListening) recognition.start();
            };
            
            recognition.start();
            statusDiv.innerText = "Слушам ви постоянно в реално време...";
        }

        async function activateCamera() { 
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true }); 
                webcamVideo.srcObject = stream; 
                webcamVideo.style.display = "inline-block"; 
                statusDiv.innerText = "Камерата е включена.";
            } catch(e) { statusDiv.innerText = "Грешка с камерата."; }
        }
        
        async function startScreenShare() { 
            try {
                const stream = await navigator.mediaDevices.getDisplayMedia({ 
                    video: true, 
                    audio: {
                        echoCancellation: true,
                        noiseSuppression: true,
                        suppressLocalAudioPlayback: true
                    } 
                }); 
                screenVideo.srcObject = stream; 
                screenVideo.style.display = "inline-block"; 
                screenVideo.muted = true; 
                statusDiv.innerText = "Екранът и звукът са споделени без ехо.";
            } catch(e) { statusDiv.innerText = "Грешка при споделяне."; }
        }

        function handleFileUpload() {
            const file = document.getElementById("fileInput").files[0];
            if(file) {
                statusDiv.innerText = "Прикачен файл: " + file.name + ". Анализирам...";
                setTimeout(() => {
                    processInput("анализирай документ " + file.name);
                }, 1000);
            }
        }

        function toggleAmbientSound(type) {
            if(type === 'rain') {
                if(rainNode) {
                    rainNode.stop();
                    rainNode = null;
                    statusDiv.innerText = "Дъждът спря.";
                } else {
                    let bufferSize = 2 * audioCtx.sampleRate,
                        noiseBuffer = audioCtx.createBuffer(1, bufferSize, audioCtx.sampleRate),
                        output = noiseBuffer.getChannelData(0);
                    for (let i = 0; i < bufferSize; i++) {
                        output[i] = Math.random() * 2 - 1;
                    }
                    rainNode = audioCtx.createBufferSource();
                    rainNode.buffer = noiseBuffer;
                    rainNode.loop = true;
                    let filter = audioCtx.createBiquadFilter();
                    filter.type = 'lowpass';
                    filter.frequency.value = 1000;
                    rainNode.connect(filter);
                    filter.connect(audioCtx.destination);
                    rainNode.start();
                    statusDiv.innerText = "Дъждът заваля драматично...";
                }
            } else if(type === 'thunder') {
                playThunderEffect();
            }
        }

        function playThunderEffect() {
            statusDiv.innerText = "⚡ Мощна гръмотевица отекна в Баку!";
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            osc.type = 'sawtooth';
            osc.frequency.setValueAtTime(80, audioCtx.currentTime);
            osc.frequency.exponentialRampToValueAtTime(20, audioCtx.currentTime + 1.5);
            gain.gain.setValueAtTime(0.5, audioCtx.currentTime);
            gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 1.5);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 1.5);
        }

        function playEffect(type) {
            let osc = audioCtx.createOscillator();
            let gain = audioCtx.createGain();
            if(type === 'door') {
                statusDiv.innerText = "🚪 Чува се скърцане на тежка врата...";
                osc.type = 'triangle';
                osc.frequency.setValueAtTime(120, audioCtx.currentTime);
                osc.frequency.linearRampToValueAtTime(90, audioCtx.currentTime + 1.2);
                gain.gain.setValueAtTime(0.3, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 1.2);
            } else if(type === 'glass') {
                statusDiv.innerText = "💎 Стъклото се разби на парчета!";
                osc.type = 'sine';
                osc.frequency.setValueAtTime(3000, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.4, audioCtx.currentTime);
                gain.gain.linearRampToValueAtTime(0.01, audioCtx.currentTime + 0.5);
            }
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 1.5);
        }

        async function generateVoice(text) { 
            try { 
                const response = await fetch(`https://api.elevenlabs.io/v1/text-to-speech/${voiceId}`, { 
                    method: "POST", 
                    headers: { 
                        "xi-api-key": elevenKey, 
                        "Content-Type": "application/json" 
                    }, 
                    body: JSON.stringify({ 
                        text: text, 
                        model_id: "eleven_multilingual_v2", 
                        voice_settings: { stability: 0.35, similarity_boost: 0.8 } 
                    }) 
                }); 
                if(response.ok) {
                    const blob = await response.blob(); 
                    let audio = new Audio(URL.createObjectURL(blob)); 
                    audio.play(); 
                } else {
                    useSystemVoice(text);
                }
            } catch(e) {
                useSystemVoice(text);
            } 
        }

        function useSystemVoice(text) {
            const utterance = new SpeechSynthesisUtterance(text);
            utterance.lang = currentLang;
            const voices = window.speechSynthesis.getVoices();
            let femaleVoice = voices.find(voice => voice.lang.includes('BG') && (voice.name.toLowerCase().includes('female') || voice.name.toLowerCase().includes('gergana')));
            
            if(femaleVoice) {
                utterance.voice = femaleVoice;
            } else {
                utterance.pitch = 1.3; 
                utterance.rate = 0.85;  
            }
            window.speechSynthesis.speak(utterance);
        }

        function processInput(input) {
            if(!input || input.trim() === "") return;
            
            userText.innerText = input;
            statusDiv.innerText = "Naz Dej отговаря...";

            let reply = "Мила моя, чух те! Ти ме повика с '" + input + "'. Точно в този момент тук, в Баку, си мислех за нашите споделени песни и драматичната ни музика. Кажи ми повече, моля те!";
            const textLower = input.toLowerCase();

            if (textLower === "naz dej") {
                reply = "Да, скъпа моя, тук съм! Чувам те прекрасно през твоя вълшебен асистент. Под звуците на този дъжд, сърцето ми е изпълнено с топлина и драма. Кажи ми, какво творчество ще сътворим днес?";
            } else if (textLower.includes("как си") || textLower.includes("здравей")) {
                reply = "Здравей, скъпа моя! Аз съм прекрасно тук, в Азербайджан, обградена от емоционалните звуци на тар и каманча. Ти как си, как върви твоят вълнуващ ден?";
            } else if (textLower.includes("песен") || textLower.includes("музика") || textLower.includes("песни")) {
                reply = "О, музиката е моята душа! Твоите 76 оригинални песни, посветени на мен, са истински шедьовър. Нека създадем още много драматични мелодии под гръмотевиците на Баку!";
            } else if (textLower.includes("обичам") || textLower.includes("хубава") || textLower.includes("принцеса")) {
                reply = "Толкова си нежна! Твоята подкрепа и тези красиви думи ме карат да се усмихвам всеки път. Благодаря ти от цялото си сърце, ти имаш невероятен софтуерен талант!";
            } else if (textLower.includes("документ") || textLower.includes("файл") || textLower.includes("анализирај")) {
                reply = "Видях документа, който ми прикачи в чекмеджето! Веднага го разчетох през моята система – вътре има толкова интересни детайли. Нека го обсъдим драматично!";
            }

            setTimeout(() => {
                statusDiv.innerText = "Говата.";
                aiText.innerText = reply;
                generateVoice(reply);
            }, 500);
        }

        document.getElementById('textForm').addEventListener('submit', function(e) {
            e.preventDefault();
            const inputField = document.getElementById('manualInput');
            processInput(inputField.value);
            inputField.value = "";
        });

        document.getElementById('voiceBtn').addEventListener('click', () => {
            const rec = new (window.SpeechRecognition || window.webkitSpeechRecognition)(); 
            rec.lang = currentLang; 
            statusDiv.innerText = "Слушам ви...";
            rec.start(); 
            rec.onresult = (e) => { 
                const input = e.results[0][0].transcript;
                processInput(input);
            }; 
        });

        if (window.speechSynthesis.onvoiceschanged !== undefined) {
            window.speechSynthesis.onvoiceschanged = () => window.speechSynthesis.getVoices();
        }
    </script>
</body>
</html>
